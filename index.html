<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOISE LADDER</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
<style>

/* ╔═══════════════════════════════════════════════════════════╗
   ║  VARIABLES GLOBALES                                       ║
   ╚═══════════════════════════════════════════════════════════╝ */
:root {
  --nl-x:      center;
  --nl-y:      170px;
  --ground-h:  519px;
  --ground-mid:260px;
  --ladder-w:  240px;
  --char-w:    290px;
  --char-h:    370px;
  --red:       #ff1a1a;
  --orange:    #ff6600;
  --fg:        #ede9e0;
}

*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; overflow-x:hidden; background:#060606; color:var(--fg); font-family:"Share Tech Mono",monospace; }

#progress { position:fixed; top:0; left:0; height:2px; width:0%; background:var(--red); z-index:1000; box-shadow:0 0 6px var(--red); transition:width .06s linear; }
#scroller { height:800vh; position:relative; z-index:0; }
#scene    { position:fixed; inset:0; width:100vw; height:100vh; overflow:hidden; z-index:1; pointer-events:none; }
#scene .block, #scene #hint, #scene #character, #scene .ext-link, #scene .music-cloud, #scene #satellite-wrap, #scene .sat-interactive { pointer-events:auto; }

#sky-canvas   { position:absolute; inset:0; width:100%; height:100%; z-index:0; }
#stars-canvas { position:absolute; inset:0; width:100%; height:100%; z-index:1; opacity:0; transition:opacity 0.8s ease; }

#ladder { position:absolute; top:0; bottom:0; left:50%; transform:translateX(-50%); width:var(--ladder-w); z-index:24; background:url("assets/ladder-tile.png") repeat-y top center / 100% auto; }

#ground, #ground-fg { position:absolute; bottom:0; left:0; right:0; height:var(--ground-h); background-repeat:no-repeat; background-position:bottom center; background-size:cover; pointer-events:none; }
#ground    { z-index:12; background-image:url("assets/ground-bg.png"); }
#ground-fg { z-index:27; background-image:url("assets/ground-fg.png"); }

#noise-letters {
  position:absolute; bottom:0; left:0; right:0; height:var(--ground-h);
  z-index:26; pointer-events:none;
  background-image:url("assets/noise-letters.png");
  background-size:1073px 151px; background-repeat:no-repeat;
  background-position:var(--nl-x) var(--nl-y);
}
@keyframes noise-flicker {
  0%   { background-image:url("assets/letters-noise1.png"); }
  25%  { background-image:url("assets/letters-noise2.png"); }
  50%  { background-image:url("assets/letters-noise3.png"); }
  75%  { background-image:url("assets/letters-noise4.png"); }
  100% { background-image:url("assets/letters-noise1.png"); }
}
#noise-letters.noise-active { animation:noise-flicker 0.5s steps(1) infinite; }

#letters-hitbox { position:fixed; z-index:200; pointer-events:auto; display:block; background:transparent; }

/* ╔═══════════════════════════════════════════════════════════╗
   ║  NUAGES MUSICAUX — STYLES                                 ║
   ╠═══════════════════════════════════════════════════════════╣
   ║  .music-cloud      → conteneur principal                 ║
   ║  .cloud-bg         → image PNG du nuage (base)           ║
   ║  .cloud-fill       → même PNG, teinté, clip-path progr.  ║
   ║  .play-btn-img     → PNG bouton play/pause flottant      ║
   ╚═══════════════════════════════════════════════════════════╝ */
/* ╔═══════════════════════════════════════════════════════════╗
   ║  NUAGES MUSICAUX — SYSTÈME VISUEL                        ║
   ╠═══════════════════════════════════════════════════════════╣
   ║                                                           ║
   ║  Structure DOM par nuage :                               ║
   ║    .music-cloud                                           ║
   ║      .cloud-inner       ← scale hover isolé du JS tx    ║
   ║        img.cloud-bg     ← PNG nuage (layer bas)          ║
   ║        img.cloud-fill   ← même PNG, teinté, clip-path    ║
   ║      img.play-btn-img   ← PNG bouton flottant, z devant  ║
   ║                                                           ║
   ║  Progression = cloud-fill révélée de gauche à droite     ║
   ║  via clip-path inset(0 X% 0 0) mis à jour en JS          ║
   ╚═══════════════════════════════════════════════════════════╝ */

/* ── Conteneur ── */
.music-cloud {
  position: absolute;
  z-index: 18;
  will-change: transform, opacity;
}

/* ── Inner : reçoit le scale hover isolément ──
   ▼ ZONE D'AJUSTEMENT — grossissement au survol du nuage    */
.cloud-inner {
  position: absolute;
  inset: 0;
  transition: transform 0.22s ease;
  transform-origin: center center;
}
.music-cloud:hover .cloud-inner {
  transform: scale(1.09); /* ← 1.09 = +9%, ajuste librement */
}
/* ▲ FIN ════════════════════════════════════════════════════ */

/* ── PNG nuage de base ── */
.cloud-bg {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: fill;
  pointer-events: none;
  user-select: none;
  -webkit-user-drag: none;
}

/* ── PNG nuage teinté (couche de progression)
   Même image que cloud-bg mais avec un filtre couleur.
   clip-path est mis à jour par JS selon la progression audio.

   ▼ ZONE D'AJUSTEMENT — couleur de remplissage progression  */
.cloud-fill {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: fill;
  pointer-events: none;
  user-select: none;
  -webkit-user-drag: none;
  /* Teinte appliquée par mix-blend-mode + filtre */
  filter: sepia(1) saturate(3) hue-rotate(160deg) brightness(0.7);
  /* ← Change hue-rotate pour changer la couleur :
       0deg   = rouge/brun
       90deg  = jaune/vert
       160deg = bleu (défaut)
       200deg = bleu-violet
       280deg = violet                                        */
  mix-blend-mode: multiply;
  clip-path: inset(0 100% 0 0); /* départ : 100% masqué à droite */
  transition: clip-path 0.1s linear;
}
/* ▲ FIN ════════════════════════════════════════════════════ */

/* ── Bouton play/pause PNG flottant devant le nuage ──
   Positionné au centre du nuage, z-index > .cloud-inner

   ▼ ZONE D'AJUSTEMENT — bouton play                        */
.play-btn-img {
  position: absolute;
  /* Centré par JS (left/top calculés selon w/h du nuage)   */
  z-index: 10;          /* devant le nuage */
  pointer-events: auto;
  user-select: none;
  -webkit-user-drag: none;
  /* ── taille du bouton ── */
  width:  100px;        /* ← ajuste la largeur  */
  height: 100px;        /* ← ajuste la hauteur  */
  /* ── centrage depuis le coin haut-gauche du nuage ──     */
  left: 50%; top: 50%;
  transform: translate(-50%, -50%) scale(1);
  transform-origin: center center;
  /* ── transitions ── */
  transition: transform 0.18s ease, filter 0.15s ease;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,0.35));
}
/* Survol : grossit pour indiquer que c'est cliquable */
.play-btn-img:hover {
  transform: translate(-50%, -50%) scale(1.18); /* ← ajuste */
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
}
/* Clic : s'enfonce */
.play-btn-img:active {
  transform: translate(-50%, -50%) scale(0.90); /* ← enfoncement */
  filter: drop-shadow(0 1px 3px rgba(0,0,0,0.3));
}
/* ▲ FIN ════════════════════════════════════════════════════ */

/* titre MY MUSIC supprimé */

/* ╔═══════════════════════════════════════════════════════════╗
   ║  BULLES BD — ZONE D'AJUSTEMENT                           ║
   ╠═══════════════════════════════════════════════════════════╣
   ║  #speech-bubble  → conteneur de la bulle active         ║
   ║  img.bubble-img  → PNG de la bulle                      ║
   ║                                                           ║
   ║  Position : centrée au-dessus du personnage             ║
   ║  --bubble-w      → largeur de la bulle (px)             ║
   ║  --bubble-top    → position verticale depuis le haut    ║
   ╚═══════════════════════════════════════════════════════════╝ */
:root {
  --bubble-w:     150px;   /* ← largeur de la bulle                        */
  --bubble-top:   40vh;    /* ← position verticale : augmente pour descendre */
}

#speech-bubble {
  position: fixed;
  left: calc(50% + var(--char-hoff));
  transform: translateX(-50%);
  /* ▼ ZONE D'AJUSTEMENT — position verticale de la bulle
     Augmente --bubble-top pour descendre, diminue pour monter.
     Valeur de référence : même top que le personnage (50vh)
     puis tu ajustes avec --bubble-top jusqu'à ce que ce soit joli. */
  top: var(--bubble-top);
  width: var(--bubble-w);
  z-index: 36;
  pointer-events: none;
  opacity: 0;
  will-change: transform, opacity;
}

#speech-bubble img {
  width: 100%;
  height: auto;
  display: block;
}

/* Animation d'entrée : rebond depuis le haut */
@keyframes bubble-bounce-in {
  0%   { transform: translateX(-50%) translateY(-30px) scale(0.6); opacity: 0; }
  60%  { transform: translateX(-50%) translateY(6px)   scale(1.05); opacity: 1; }
  80%  { transform: translateX(-50%) translateY(-4px)  scale(0.97); }
  100% { transform: translateX(-50%) translateY(0)     scale(1);    opacity: 1; }
}
#speech-bubble.bubble-visible {
  animation: bubble-bounce-in 0.45s cubic-bezier(.22,.68,0,1.3) forwards;
}
#speech-bubble.bubble-hidden {
  opacity: 0;
  transition: opacity 0.15s ease;
}
/* ▲ FIN BULLES BD ══════════════════════════════════════════ */

/* ╔═══════════════════════════════════════════════════════════╗
   ║  PERSONNAGE — ZONE D'AJUSTEMENT MANUEL                   ║
   ╠═══════════════════════════════════════════════════════════╣
   ║  --char-hoff : décalage horizontal depuis le centre de   ║
   ║                l'échelle (px, positif = droite)          ║
   ║  --char-voff : décalage vertical depuis 50vh             ║
   ║                (px, positif = vers le bas)               ║
   ║  --char-w / --char-h : taille dans :root ci-dessus       ║
   ╚═══════════════════════════════════════════════════════════╝ */
:root {
  --char-hoff: 0px;    /* ← décalage horizontal depuis centre échelle  */
  --char-voff: 0px;    /* ← décalage vertical depuis 50vh              */
}

#character {
  position: fixed;
  left: calc(50% + var(--char-hoff));
  top:  calc(50vh + var(--char-voff));
  transform: translate(-50%, -20%);
  width:  var(--char-w);
  height: var(--char-h);
  z-index: 30;
  pointer-events: none;
}
.char-frame {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  display: none;
}
.char-frame.active { display: block; }
.char-frame img { width:100%; height:100%; object-fit:contain; object-position:center; }
.char-placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:3rem; }

#hint { position:absolute; bottom:calc(var(--ground-mid) - 200px); left:50%; transform:translateX(-50%); z-index:60; display:flex; align-items:center; gap:16px; pointer-events:none; transition:opacity 0.4s ease; animation:hint-bounce 1.2s ease-in-out infinite; }
#hint-label { font-family:"Luckiest Guy",monospace; font-size:2rem; letter-spacing:0.18em; text-transform:uppercase; color:rgba(236,194,67,0.75); white-space:nowrap; }

#altitude { position:absolute; top:2.5vh; left:50%; transform:translateX(-50%); font-size:0.56rem; letter-spacing:0.3em; color:rgba(237,233,224,0.2); text-transform:uppercase; z-index:70; pointer-events:none; transition:opacity 0.5s; white-space:nowrap; }

/* ╔═══════════════════════════════════════════════════════════╗
   ║  BOUTON MUTE — ZONE D'AJUSTEMENT MANUEL                  ║
   ╚═══════════════════════════════════════════════════════════╝ */
#mute-btn {
  position: fixed;
  top:  50px;
  left: 100px;
  z-index: 500;
  width:  80px; height: 80px;
  border-radius: 50%;
  background: rgba(124,121,121,0.3);
  backdrop-filter: blur(8px);
  color: var(--fg);
  border: none;
  display: flex; align-items: center; justify-content: center;
  transition: background .2s;
}
#mute-btn:hover { background: rgba(129,135,193,0.418); }
#mute-btn svg { width:50px; height:50px; fill:none; stroke:currentColor; stroke-width:1; stroke-linecap:round; stroke-linejoin:round; overflow:visible; }

/* Flèche "pump up the volume" — même style que #hint-label */
#volume-hint {
  position: fixed;
  /* Aligné verticalement au centre du bouton mute (top:50px, height:80px → centre = 90px) */
  top:  90px;                           /* ← top_mute(50) + height_mute(80)/2             */
  transform: translateY(-50%);          /* ← centre le hint sur cette ligne               */
  left: calc(100px + 80px + 18px);      /* ← left_mute(100) + width_mute(80) + gap(18)   */
  z-index: 500;
  display: flex;
  align-items: center;
  gap: 12px;
  pointer-events: none;
  animation: hint-bounce-h 1.2s ease-in-out infinite; /* bounce horizontal → */
  transition: opacity 0.4s ease;
}
#volume-hint-label {
  font-family: "Luckiest Guy", monospace;
  font-size: 1.5rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(236,194,67,0.75);
  white-space: nowrap;
}
/* Caché quand le son est activé */
#volume-hint.sound-on { display: none; }
/* Bounce horizontal pour la flèche → (distinct du bounce vertical ↑ du hint scroll) */
@keyframes hint-bounce-h {
  0%,100% { transform: translateY(-50%) translateX(0);    }
  50%      { transform: translateY(-50%) translateX(8px); }
}

/* ╔═══════════════════════════════════════════════════════════╗
   ║  SATELLITE VIDEO — ZONE D'AJUSTEMENT                     ║
   ╠═══════════════════════════════════════════════════════════╣
   ║  Un seul PNG : assets/satellite-body.png                 ║
   ║  Les deux panels sont positionnés PAR-DESSUS en absolu   ║
   ║                                                           ║
   ║  ▼ ZONES D'AJUSTEMENT                                    ║
   ║  --sat-w / --sat-h   → taille du PNG (px)               ║
   ║  --sat-left-x/y      → coin haut-gauche du panel gauche ║
   ║  --sat-left-w/h      → taille du panel gauche           ║
   ║  --sat-right-x/y     → coin haut-gauche du panel droit  ║
   ║  --sat-right-w/h     → taille du panel droit            ║
   ╚═══════════════════════════════════════════════════════════╝ */
:root {
  --sat-w:       1200px;  /* ← largeur du PNG satellite          */
  --sat-h:        600px;  /* ← hauteur du PNG satellite          */

  /* Panel gauche (lecteur vidéo) — ajuste pour coller au PNG
     Hypothèse : panneau gauche occupe ~30% gauche du PNG       */
  --sat-left-x:   40px;   /* ← depuis bord gauche du PNG        */
  --sat-left-y:  190px;   /* ← depuis bord haut du PNG          */
  --sat-left-w:  310px;   /* ← largeur du panel                 */
  --sat-left-h:  220px;   /* ← hauteur du panel                 */

  /* Panel droit (playlist) — ajuste pour coller au PNG
     Hypothèse : panneau droit occupe ~30% droit du PNG         */
  --sat-right-x: 850px;   /* ← depuis bord gauche du PNG        */
  --sat-right-y: 190px;   /* ← depuis bord haut du PNG          */
  --sat-right-w: 310px;   /* ← largeur du panel                 */
  --sat-right-h: 220px;   /* ← hauteur du panel                 */
}

#satellite-wrap {
  position: absolute;
  left: 50%;
  top:  50%;
  transform: translate(-50%, -50%) scale(0.01);
  transform-origin: center center;
  z-index: 15;             /* derrière échelle(24) et perso(30) */
  width:  var(--sat-w);
  height: var(--sat-h);
  pointer-events: none;
  will-change: transform, opacity;
  opacity: 0;
}

/* PNG du satellite en fond */
#sat-body {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: contain;
  pointer-events: none;
  user-select: none;
}

/* Panels superposés sur le PNG */
.sat-panel {
  position: absolute;
  overflow: hidden;
  background: rgba(8, 16, 32, 0.88);
  border: 1px solid rgba(100,160,255,0.2);
  display: flex;
  flex-direction: column;
  opacity: 0;
  transition: opacity 0.4s ease;
  pointer-events: none;
}
.sat-panel.panel-ready {
  opacity: 1;
  pointer-events: auto;
}

#sat-panel-left {
  left:   var(--sat-left-x);
  top:    var(--sat-left-y);
  width:  var(--sat-left-w);
  height: var(--sat-left-h);
}
#sat-panel-right {
  left:   var(--sat-right-x);
  top:    var(--sat-right-y);
  width:  var(--sat-right-w);
  height: var(--sat-right-h);
}

/* ▼ ZONE D'AJUSTEMENT — style des panneaux */
.sat-panel-header {
  padding: 6px 10px 5px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 0.75rem;
  letter-spacing: 0.12em;
  color: rgba(100,180,255,0.65);
  border-bottom: 1px solid rgba(100,160,255,0.12);
  flex-shrink: 0;
}

#sat-player-wrap {
  flex: 1;
  position: relative;
  background: #000;
}
#sat-player-wrap iframe {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  border: none;
}

#sat-playlist {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: rgba(100,160,255,0.25) transparent;
}
.sat-playlist-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  transition: background 0.15s;
}
.sat-playlist-item:hover  { background: rgba(100,160,255,0.08); }
.sat-playlist-item.active { background: rgba(100,160,255,0.14); }
.sat-playlist-thumb {
  width: 56px; height: 32px;
  object-fit: cover;
  flex-shrink: 0;
  border: 1px solid rgba(100,160,255,0.15);
}
.sat-playlist-title {
  font-size: 0.55rem;
  letter-spacing: 0.05em;
  color: rgba(237,233,224,0.55);
  line-height: 1.3;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
.sat-playlist-item.active .sat-playlist-title { color: rgba(100,180,255,0.85); }
/* ▲ FIN SATELLITE ══════════════════════════════════════════ */


/* ╔═══════════════════════════════════════════════════════════╗
   ║  SECTION BIO — UFO + TEXTE TYPEWRITER                    ║
   ╠═══════════════════════════════════════════════════════════╣
   ║  PNG recommandé : assets/ufo.png                         ║
   ║  Taille idéale  : 800 × 600 px                           ║
   ║    → soucoupe en haut (~200px de hauteur)                ║
   ║    → faisceau lumineux vers le bas (~400px)              ║
   ║  Le PNG doit être transparent hors soucoupe/faisceau     ║
   ║                                                           ║
   ║  Z-index : 28 → devant échelle(24), derrière perso(30)  ║
   ╚═══════════════════════════════════════════════════════════╝ */

/* ▼ ZONE D'AJUSTEMENT — taille et position UFO */
:root {
  --ufo-w:      1000px;  /* ← largeur du PNG ufo.png                      */
  --ufo-h:      800px;  /* ← hauteur du PNG ufo.png                      */
  --ufo-top:     20px;  /* ← distance depuis le haut de l'écran (px)     */
                        /*   augmente pour descendre, diminue pour monter */
}

#ufo-wrap {
  position: absolute;
  left: 50%;
  top: var(--ufo-top);
  transform: translateX(-50%);  /* JS overrides this during entry/exit */
  width:  var(--ufo-w);
  height: var(--ufo-h);
  z-index: 28;
  pointer-events: none;
  will-change: transform, opacity;
  opacity: 0;
}

/* Inner reçoit la lévitation CSS — isolé du translateY JS du parent */
#ufo-inner {
  width: 100%; height: 100%;
  transition: transform 0.3s ease;
}

#ufo-img {
  width: 100%; height: 100%;
  object-fit: contain;
  display: block;
}

/* ── Lévitation de l'UFO ──
   ▼ ZONE D'AJUSTEMENT
   translateY(-Xpx) : amplitude verticale (px)
   Xs ease-in-out   : durée d'un cycle complet                */
@keyframes ufo-levitate {
  0%,100% { transform: translateY(0);       }
  50%     { transform: translateY(-18px);   }
  /* ← change -18px pour plus ou moins d'amplitude           */
}
#ufo-wrap.ufo-active #ufo-inner {
  animation: ufo-levitate 2.4s ease-in-out infinite;
  /* ← change 2.4s pour vitesse de lévitation                */
}
/* ▲ FIN UFO POSITION ════════════════════════════════════════ */

/* ── Personnage figé : animation bob (lévitation) ──
   ▼ ZONE D'AJUSTEMENT
   bob-distance : amplitude verticale en px
   bob-duration : durée d'un cycle complet                    */
@keyframes char-bob {
  0%,100% { transform: translate(-50%, -20%) translateY(0);      }
  50%     { transform: translate(-50%, -20%) translateY(-12px);  }
  /* ← change -12px pour plus ou moins d'amplitude             */
}
#character.char-frozen {
  animation: char-bob 1.8s ease-in-out infinite;
  /* ← change 1.8s pour vitesse de lévitation                 */
}
/* ▲ FIN BOB ═════════════════════════════════════════════════ */

/* ── Texte typewriter ── */
#bio-text-wrap {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  z-index: 29;
  opacity: 0;
  transition: opacity 0.4s ease;
}
#bio-text-wrap.bio-visible { opacity: 1; }

/* ▼ ZONE D'AJUSTEMENT — colonnes de texte bio
   Les deux colonnes sont centrées verticalement sur l'écran,
   et positionnées de part et d'autre du centre horizontal.

   --bio-col-gap  : distance du centre à chaque colonne (px)
                    0 = collé au centre, augmente pour écarter
   --bio-col-w    : largeur de chaque colonne (px)
   --bio-col-top  : position verticale depuis le haut (vh)
                    50vh = milieu écran, diminue pour monter       */
:root {

// ══════════════════════════════════════════════════════════
// OSCILLATEUR DE SCROLL — grave → aigu selon altitude
// ══════════════════════════════════════════════════════════

/* ════════════════════════════════════════════════════════
   ▼ ZONE D'AJUSTEMENT — OSCILLATEUR

   OSC_FREQ_MIN   : fréquence au bas de la page (Hz)
                    graves : 40–120 Hz
   OSC_FREQ_MAX   : fréquence en haut de la page (Hz)
                    aigus  : 800–2000 Hz
   OSC_TYPE       : forme d'onde
                    'sine'     = son pur, doux
                    'triangle' = léger, harmonieux
                    'sawtooth' = rauque, industriel
                    'square'   = carré, électronique
   OSC_GAIN       : volume de l'oscillateur (0.0 – 1.0)
   OSC_FADE_MS    : fondu enchaîné (ms) quand on s'arrête/repart
   OSC_STOP_DELAY : délai sans scroll avant coupure (ms)
   ════════════════════════════════════════════════════════ */
var OSC_FREQ_MIN   = 55;       /* ← fréquence grave (bas de page)  */
var OSC_FREQ_MAX   = 1200;     /* ← fréquence aiguë (haut de page) */
var OSC_TYPE       = 'sawtooth'; /* ← 'sine' / 'triangle' / 'sawtooth' / 'square' */
var OSC_GAIN       = 0.18;     /* ← volume (0.0 = muet, 1.0 = plein) */
var OSC_FADE_MS    = 80;       /* ← durée du fondu (ms)            */
var OSC_STOP_DELAY = 120;      /* ← délai avant coupure (ms)       */
/* ▲ FIN ZONE D'AJUSTEMENT ═══════════════════════════════ */

var OSC = (function(){
  var ctx = null, osc = null, gainNode = null;
  var running   = false;
  var stopTimer = null;

  function getCtx(){
    if(!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    return ctx;
  }

  function start(){
    if(running) return;
    var ac = getCtx();
    if(ac.state === 'suspended') ac.resume();

    gainNode = ac.createGain();
    gainNode.gain.setValueAtTime(0, ac.currentTime);
    gainNode.gain.linearRampToValueAtTime(OSC_GAIN, ac.currentTime + OSC_FADE_MS / 1000);
    gainNode.connect(ac.destination);

    osc = ac.createOscillator();
    osc.type = OSC_TYPE;
    osc.frequency.setValueAtTime(OSC_FREQ_MIN, ac.currentTime);
    osc.connect(gainNode);
    osc.start();
    running = true;
  }

  function stop(){
    if(!running || !gainNode) return;
    var ac = getCtx();
    gainNode.gain.cancelScheduledValues(ac.currentTime);
    gainNode.gain.setValueAtTime(gainNode.gain.value, ac.currentTime);
    gainNode.gain.linearRampToValueAtTime(0, ac.currentTime + OSC_FADE_MS / 1000);
    var g = gainNode, o = osc;
    setTimeout(function(){
      try{ o.stop(); o.disconnect(); g.disconnect(); } catch(e){}
    }, OSC_FADE_MS + 20);
    running = false; osc = null; gainNode = null;
  }

  // Appelée à chaque scroll avec p (0=bas, 1=haut) et scrolling=true/false
  function update(p, scrolling){
    // Ne joue pas si SND est muet ou pas débloqué
    if(!SND.isUnlocked() || SND.isMuted()){
      if(running) stop();
      return;
    }

    clearTimeout(stopTimer);

    if(!scrolling || p < 0.01){
      // Pas de scroll ou tout en bas → silence
      stopTimer = setTimeout(stop, OSC_STOP_DELAY);
      return;
    }

    if(!running) start();

    if(running && gainNode){
      var ac = getCtx();
      // Fréquence : interpolation exponentielle grave→aigu
      // exp donne une progression plus musicale que linéaire
      var freq = OSC_FREQ_MIN * Math.pow(OSC_FREQ_MAX / OSC_FREQ_MIN, p);
      osc.frequency.setTargetAtTime(freq, ac.currentTime, 0.04);
    }
  }

  // Sync état mute (appelé depuis bouton mute)
  function sync(){
    if(SND.isMuted() && running) stop();
  }

  return { update: update, sync: sync };
})();

function formatTime(s){
  s = Math.floor(s||0);
  return Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60;
}

function buildClouds(){
  var container = document.getElementById('clouds-container');
  container.style.cssText = 'position:absolute;inset:0;pointer-events:none;z-index:18;';

  /* ════════════════════════════════════════════════════════
     ▼ ZONE D'AJUSTEMENT — PNG du bouton play/pause
     Remplace ces src par tes propres PNG.
     Si tu n'as pas de PNG, un SVG inline est généré en fallback.
     play-btn-play.png  → état lecture stoppée
     play-btn-pause.png → état en cours de lecture          */
  var PLAY_PNG  = 'assets/play-btn-play.png';
  var PAUSE_PNG = 'assets/play-btn-pause.png';
  /* ▲ FIN ════════════════════════════════════════════════ */

  CLOUD_CONFIG.forEach(function(cfg){

    // ── Conteneur principal (JS anime son transform/opacity) ──
    var el = document.createElement('div');
    el.className = 'music-cloud';
    el.style.cssText = 'width:'+cfg.w+'px;height:'+cfg.h+'px;cursor:pointer;z-index:'+(cfg.z||18)+';';

    // ── Inner : scale hover CSS isolé ──
    var inner = document.createElement('div');
    inner.className = 'cloud-inner';

    // PNG nuage de base
    var bg = document.createElement('img');
    bg.className = 'cloud-bg';
    bg.src = cfg.png;
    bg.alt = '';
    inner.appendChild(bg);

    // PNG nuage teinté (progression) — même source, filtre CSS
    var fill = document.createElement('img');
    fill.className = 'cloud-fill';
    fill.src = cfg.png;
    fill.alt = '';
    inner.appendChild(fill);

    el.appendChild(inner);

    // ── Bouton play/pause PNG flottant (hors .cloud-inner pour ne pas
    //    être affecté par le scale hover du nuage) ──
    var playBtn = document.createElement('img');
    playBtn.className = 'play-btn-img';
    playBtn.src = PLAY_PNG;
    playBtn.alt = 'play';
    el.appendChild(playBtn);

    container.appendChild(el);

    // ── Audio ──
    var audio = new Audio(cfg.mp3);
    audio.preload = 'metadata';
    SND.register(audio);

    var item = { el:el, cfg:cfg, audio:audio, fill:fill, playBtn:playBtn,
                 playPng:PLAY_PNG, pausePng:PAUSE_PNG };
    cloudEls.push(item);

    // ── Clic sur le NUAGE (pas le bouton) : seek ──
    // Le clic sur le nuage lui-même seek dans le morceau
    // proportionnellement à la position X du clic dans le nuage.
    el.addEventListener('click', function(e){
      // Si on a cliqué sur le bouton play, ne pas seek
      if(e.target === playBtn) return;
      if(!audio.duration) return;
      var rect = el.getBoundingClientRect();
      var ratio = (e.clientX - rect.left) / rect.width;
      audio.currentTime = ratio * audio.duration;
    });

    // ── Clic sur le bouton play ──
    playBtn.addEventListener('click', function(e){
      e.stopPropagation();

      // Débloque + active son global automatiquement
      if(!SND.isUnlocked() || SND.isMuted()){
        SND.unlock();
        SND.setMuted(false);
        var muteBtn = document.getElementById('mute-btn');
        var svgOn = '<svg viewBox="0 0 24 24"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><path d="M15.54,8.46a5,5,0,0,1,0,7.07"/><path d="M19.07,4.93a10,10,0,0,1,0,14.14"/></svg>';
        if(muteBtn) muteBtn.innerHTML = svgOn;
      }

      if(!audio.paused){
        audio.pause();
        playBtn.src = PLAY_PNG;
      } else {
        // Stoppe tous les autres
        cloudEls.forEach(function(other){
          if(other.audio !== audio){
            other.audio.pause();
            other.playBtn.src = other.playPng;
          }
        });
        audio.play().catch(function(){});
        playBtn.src = PAUSE_PNG;
      }
    });

    // ── Progression : met à jour clip-path du fill ──
    audio.addEventListener('timeupdate', function(){
      if(!audio.duration) return;
      var pct = (audio.currentTime / audio.duration) * 100;
      // Révèle le fill de gauche à droite :
      // inset(top  right  bottom  left)
      // right = 100% → 0% au fur et à mesure
      fill.style.clipPath = 'inset(0 '+(100-pct)+'% 0 0)';
    });

    audio.addEventListener('ended', function(){
      playBtn.src = PLAY_PNG;
      fill.style.clipPath = 'inset(0 100% 0 0)';
    });
  });
}

var bubbleEl       = document.getElementById('speech-bubble');
var bubbleImg      = document.getElementById('bubble-img');

function getBubblePng(p) {
  for (var i = 0; i < BUBBLE_ZONES.length; i++) {
    var z = BUBBLE_ZONES[i];
    if (p >= z.pMin && p < z.pMax) return z.png;
  }
  return BUBBLE_ZONES[BUBBLE_ZONES.length - 1].png;
}

function showBubble(p) {
  var png = getBubblePng(p);
  bubbleImg.src = png;
  bubbleEl.classList.remove('bubble-hidden');
  // Réactive l'animation en retirant/remettant la classe
  bubbleEl.classList.remove('bubble-visible');
  void bubbleEl.offsetWidth; // force reflow pour reset l'animation
  bubbleEl.classList.add('bubble-visible');
  bubbleEl.style.opacity = '1';
  bubbleShown = true;
}

function hideBubble() {
  bubbleEl.classList.remove('bubble-visible');
  bubbleEl.classList.add('bubble-hidden');
  bubbleEl.style.opacity = '0';
  bubbleShown = false;
}

function updateBubble(p, scrolling) {
  bubbleCurrentP = p;

  if (scrolling) {
    // Pendant le scroll : cache la bulle immédiatement
    clearTimeout(bubbleTimer);
    if (bubbleShown) hideBubble();
    return;
  }

  // Scroll stoppé : attend BUBBLE_IDLE_MS puis affiche
  clearTimeout(bubbleTimer);
  bubbleTimer = setTimeout(function() {
    showBubble(bubbleCurrentP);
  }, BUBBLE_IDLE_MS);
}

   Pour allonger la section vidéo : écarte SAT_P_FULL et SAT_P_ROT_OUT
   Pour ralentir la rotation      : écarte les zones _ROT_
   Pour ralentir le glissement    : écarte les zones _SLIDE_

var SAT_P_FULL      = 0.44;  /* ← satellite-body en place, panels actifs */
var SAT_P_ROT_OUT   = 0.60;  /* ← rotation inverse commence             */
var SAT_P_SLIDE_OUT = 0.68;  /* ← sat-left repart vers la droite        */
var SAT_P_GONE      = 0.76;  /* ← satellite hors écran à droite         */
/* ▲ FIN ZONE D'AJUSTEMENT ═══════════════════════════════ */

/* ════════════════════════════════════════════════════════
   updateSatellite(p) — 100% piloté par p, aucun timer.

   MONTÉE (p croît) :
   [< SLIDE_IN]           hors écran gauche, sat-left
   [SLIDE_IN → ROT_IN]    sat-left glisse de gauche → près de l'échelle
   [ROT_IN   → FULL]      rotation sat-left→sat-1→…→satellite-body, fixe X
   [FULL     → ROT_OUT]   satellite-body fixe, panels actifs
   [ROT_OUT  → SLIDE_OUT] rotation inverse satellite-body→…→sat-1→sat-left, fixe X
   [SLIDE_OUT→ GONE]      sat-left glisse vers la droite
   [> GONE]               hors écran droite, sat-left

   DESCENTE (p décroît) : symétrique automatique car tout = f(p)
   ════════════════════════════════════════════════════════ */
function updateSatellite(p) {
  if(!satWrap) return;

  var n  = SAT_FRAMES.length;
  var tx = 0;
  var op = 0;
  var fi = 0;        // frame index
  var panels = false;

  /* ── Position horizontale de repos (rotation) ──
     Pendant les phases de rotation et statique, le satellite
     est centré à x=0. On peut décaler avec satRestX si besoin. */
  var restX = 0; /* ← ajuste pour décaler la position au repos (px) */

  if(p < SAT_P_SLIDE_IN) {
    /* Hors écran gauche */
    tx = -window.innerWidth * 1.4;
    op = Math.max(0, (p - (SAT_P_SLIDE_IN - 0.02)) / 0.02); // fade-in léger
    fi = 0;

  } else if(p <= SAT_P_ROT_IN) {
    /* Glissement gauche → position de rotation */
    var t1 = (p - SAT_P_SLIDE_IN) / (SAT_P_ROT_IN - SAT_P_SLIDE_IN);
    var e1 = 1 - Math.pow(1 - t1, 3); // easeOut
    tx = restX - window.innerWidth * 1.4 * (1 - e1);
    op = Math.min(1, t1 * 3);
    fi = 0; // sat-left pendant tout le glissement

  } else if(p <= SAT_P_FULL) {
    /* Rotation sat-left → satellite-body, satellite fixe */
    var t2 = (p - SAT_P_ROT_IN) / (SAT_P_FULL - SAT_P_ROT_IN);
    tx = restX;
    op = 1;
    fi = Math.round(t2 * (n - 1));
    fi = Math.max(0, Math.min(n-1, fi));

  } else if(p < SAT_P_ROT_OUT) {
    /* Satellite-body fixe, panels actifs */
    tx = restX;
    op = 1;
    fi = n - 1;
    panels = true;

  } else if(p <= SAT_P_SLIDE_OUT) {
    /* Rotation inverse satellite-body → sat-left, satellite fixe */
    var t3 = (p - SAT_P_ROT_OUT) / (SAT_P_SLIDE_OUT - SAT_P_ROT_OUT);
    tx = restX;
    op = 1;
    fi = Math.round((1 - t3) * (n - 1));
    fi = Math.max(0, Math.min(n-1, fi));

  } else if(p <= SAT_P_GONE) {
    /* Glissement vers la droite */
    var t4 = (p - SAT_P_SLIDE_OUT) / (SAT_P_GONE - SAT_P_SLIDE_OUT);
    var e4 = Math.pow(t4, 2); // easeIn
    tx = restX + window.innerWidth * 1.4 * e4;
    op = 1 - t4;
    fi = 0; // sat-left pendant tout le glissement sortie

  } else {
    /* Hors écran droite */
    tx = window.innerWidth * 1.4;
    op = 0;
    fi = 0;
  }

  if(satBodyImg) satBodyImg.src = SAT_FRAMES[fi];
  satWrap.style.transform = 'translate(calc(-50% + '+tx+'px), -50%)';
  satWrap.style.opacity   = String(Math.max(0, Math.min(1, op)));
  showSatPanels(panels);
}

  " performing across the French rave ",
  "and festival scene.",
  "My live sets are a raw blend ",
  "of analog synthesis and curated samples."
].join('\n');

var BIO_TEXT_RIGHT = [
  "In 2010, I moved to Vilnius, Lithuania,",
  " and rebranded as Noise Ladder,",
  "focusing on modular synthesis,",
  "harsh noise, and drone.",
  "Recently, I've returned to my roots ",
  "in Hardtek and Hardcore,",
  "uniquely infusing them with traditional Jewish music.",
].join('\n');

var BIO_TYPEWRITER_MS = 22; /* ← ms par caractère             */
/* ▲ FIN ZONE D'AJUSTEMENT TEXTE ═════════════════════════ */

var ufoWrap       = null;
var bioTextWrap   = null;
var bioTextLeft   = null;
var bioTextRight  = null;
var bioActive     = false;
var bioTyperLeft  = null; // timer typewriter gauche
var bioTyperRight = null; // timer typewriter droite
var bioTyperIdx   = { l: 0, r: 0 };

function initBio() {
  ufoWrap      = document.getElementById('ufo-wrap');
  bioTextWrap  = document.getElementById('bio-text-wrap');
  bioTextLeft  = document.getElementById('bio-text-left');
  bioTextRight = document.getElementById('bio-text-right');
}

function startTypewriter() {
  if(bioTyperLeft || bioTyperRight) return; // déjà en cours
  bioTyperIdx.l = 0;
  bioTyperIdx.r = 0;
  bioTextLeft.textContent  = '';
  bioTextRight.textContent = '';

  function typeLeft() {
    if(bioTyperIdx.l < BIO_TEXT_LEFT.length) {
      bioTextLeft.textContent += BIO_TEXT_LEFT[bioTyperIdx.l++];
      bioTyperLeft = setTimeout(typeLeft, BIO_TYPEWRITER_MS);
    } else { bioTyperLeft = null; }
  }
  function typeRight() {
    if(bioTyperIdx.r < BIO_TEXT_RIGHT.length) {
      bioTextRight.textContent += BIO_TEXT_RIGHT[bioTyperIdx.r++];
      bioTyperRight = setTimeout(typeRight, BIO_TYPEWRITER_MS);
    } else { bioTyperRight = null; }
  }
  typeLeft();
  typeRight();
}

function stopTypewriter() {
  clearTimeout(bioTyperLeft);  bioTyperLeft  = null;
  clearTimeout(bioTyperRight); bioTyperRight = null;
  bioTextLeft.textContent  = '';
  bioTextRight.textContent = '';
  bioTyperIdx.l = 0;
  bioTyperIdx.r = 0;
}

function updateBio(p) {
  if(!ufoWrap) return;

  var ty = 0;  // translateY de l'UFO (descend depuis le haut)
  var op = 0;
  var inSection = false;

  if(p < BIO_P_IN) {
    /* UFO au-dessus de l'écran */
    ty = -window.innerHeight * 1.2;
    op = 0;

  } else if(p <= BIO_P_FULL) {
    /* Descend depuis le haut */
    var t1 = (p - BIO_P_IN) / (BIO_P_FULL - BIO_P_IN);
    var e1 = 1 - Math.pow(1 - t1, 3); // easeOut
    ty = -window.innerHeight * 1.2 * (1 - e1);
    op = Math.min(1, t1 * 2);

  } else if(p < BIO_P_FADE) {
    /* En place */
    ty = 0;
    op = 1;
    inSection = true;

  } else if(p <= BIO_P_OUT) {
    /* Remonte */
    var t2 = (p - BIO_P_FADE) / (BIO_P_OUT - BIO_P_FADE);
    ty = -window.innerHeight * 1.2 * Math.pow(t2, 2);
    op = 1 - t2;

  } else {
    ty = -window.innerHeight * 1.2;
    op = 0;
  }

  ufoWrap.style.transform = 'translateX(-50%) translateY(' + ty + 'px)';
  ufoWrap.style.opacity   = String(Math.max(0, Math.min(1, op)));
  ufoWrap.classList.toggle('ufo-active', inSection);

  // Texte + perso figé
  if(inSection && !bioActive) {
    bioActive = true;
    bioTextWrap.classList.add('bio-visible');
    startTypewriter();
    // Fige le personnage sur char-frozen.png
    document.getElementById('character').classList.add('char-frozen');
    showFrame('char-idle'); // utilise char-idle comme frame figée
                            // (remplace par char-frozen si tu as ce PNG)
  } else if(!inSection && bioActive) {
    bioActive = false;
    bioTextWrap.classList.remove('bio-visible');
    stopTypewriter();
    // Libère le personnage
    document.getElementById('character').classList.remove('char-frozen');
  }
}

function updateClouds(p){
  var vw = window.innerWidth;
  var vh = window.innerHeight;
  // Centre de l'échelle en px depuis la gauche
  var ladderCx = vw / 2;
  var ladderHW = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--ladder-w'))||240;
  ladderHW = ladderHW / 2;

  cloudEls.forEach(function(item){
    var cfg = item.cfg;
    var el  = item.el;

    // ── Position finale (au repos) ──
    var finalX, finalY;
    finalY = vh * (cfg.vPos / 100) - cfg.h / 2;

    if(cfg.side === 'left'){
      // Bord droit du nuage = bord gauche de l'échelle - hOff
      finalX = ladderCx - ladderHW - cfg.hOff - cfg.w;
    } else {
      // Bord gauche du nuage = bord droit de l'échelle + hOff
      finalX = ladderCx + ladderHW + cfg.hOff;
    }

    var tx = 0, ty = 0, op = 0;

    if(p < cfg.pIn){
      // En attente hors écran à droite
      tx = vw + cfg.w;
      ty = 0;
      op = 0;

    } else if(p <= cfg.pFull){
      // Arrive depuis la droite → position finale
      var t = 1 - Math.pow(1-(p-cfg.pIn)/(cfg.pFull-cfg.pIn), CLOUD_EASE_IN);
      tx = (vw + cfg.w) * (1 - t);
      ty = 0;
      op = t;

    } else if(p < cfg.pFadeOut){
      // En place, visible
      tx = 0;
      ty = 0;
      op = 1;

    } else if(p <= cfg.pOut){
      // Part vers la gauche
      var t2 = Math.pow((p-cfg.pFadeOut)/(cfg.pOut-cfg.pFadeOut), CLOUD_EASE_OUT);
      tx = -t2 * (vw + cfg.w); // ← glisse vers la gauche
      ty = 0;
      op = 1 - t2;

    } else {
      // Parti
      tx = -(vw + cfg.w);
      ty = 0;
      op = 0;
    }

    el.style.left      = finalX + 'px';
    el.style.top       = finalY + 'px';
    el.style.transform = 'translate('+tx+'px,'+ty+'px)';
    el.style.opacity   = op;
    el.style.pointerEvents = op > 0.1 ? 'auto' : 'none';
  });
}

// ── HITBOX NOISE LETTERS ──
var NL_W=1073, NL_H=151, currentTY=0;
var hitbox = document.getElementById('letters-hitbox');

function positionHitbox(){
  var st=getComputedStyle(document.documentElement);
  var nlX=st.getPropertyValue('--nl-x').trim();
  var nlY=parseFloat(st.getPropertyValue('--nl-y'))||170;
  var gh=parseFloat(st.getPropertyValue('--ground-h'))||519;
  var vw=window.innerWidth, vh=window.innerHeight;
  var left;
  if(nlX==='center')           left=(vw-NL_W)/2;
  else if(nlX.indexOf('%')>-1) left=parseFloat(nlX)/100*vw-NL_W/2;
  else                         left=parseFloat(nlX);
  hitbox.style.left  =Math.round(left)+'px';
  hitbox.style.top   =Math.round((vh-gh)+nlY+currentTY)+'px';
  hitbox.style.width =NL_W+'px';
  hitbox.style.height=NL_H+'px';
}

function initNoiseHover(){
  var noiseEl=document.getElementById('noise-letters');
  hitbox.addEventListener('mouseenter',function(){noiseEl.classList.add('noise-active');SND.play(noiseAudio);});
  hitbox.addEventListener('mouseleave',function(){noiseEl.classList.remove('noise-active');SND.stop(noiseAudio);});
}

// ── LADDER ──
var TILE_H=200, SM=8;
var $ladder=document.getElementById('ladder');
function updateLadder(p){
  $ladder.style.backgroundPositionY=(p*TILE_H*SM)+'px';
  var prog=Math.min(1,p/0.25);
  currentTY=prog*(window.innerHeight*1.1);
  ['ground','ground-fg','noise-letters'].forEach(function(id){
    var e=document.getElementById(id);if(e)e.style.transform='translateY('+currentTY+'px)';
  });
  positionHitbox();
}

// ── SCROLL ──
var $prog=document.getElementById('progress');
var $hint=document.getElementById('hint');
var oscScrollTimer = null;   // détecte l'arrêt du scroll pour OSC
var isScrolling    = false;

function onScroll(){
  var maxSc=document.getElementById('scroller').offsetHeight-window.innerHeight;
  if(maxSc<=0)return;
  var p=Math.max(0,Math.min(1,1-window.scrollY/maxSc));
  $prog.style.width=(p*100)+'%';
  var scrollHintOpacity = Math.max(0,1-p/0.08);
  $hint.style.opacity = scrollHintOpacity;
  var vh = document.getElementById('volume-hint');
  if(vh) vh.style.opacity = scrollHintOpacity;

  // Marque qu'on scrolle activement
  isScrolling = true;
  clearTimeout(oscScrollTimer);
  oscScrollTimer = setTimeout(function(){
    isScrolling = false;
    OSC.update(p, false);
    updateBubble(p, false);
  }, OSC_STOP_DELAY);

  OSC.update(p, true);
  updateBubble(p, true);

  drawSky(p); updateStars(p); updateAltitude(p);
  updateCharacter(p); updateLadder(p); updateBlocks(p); updateClouds(p); updateSatellite(p); updateBio(p);
}

// ── INIT ──
function init(){
  measureLayout(); buildClouds(); buildSatellite(); initBio();
  initMuteBtn(); initNoiseHover(); positionHitbox();
  showFrame('char-sit');
  showBubble(0);
  drawSky(0);
  var maxSc=document.getElementById('scroller').offsetHeight-window.innerHeight;
  window.scrollTo({top:maxSc,behavior:'instant'});
  setTimeout(onScroll,60);
}


window.addEventListener('scroll', onScroll, {passive:true});
window.addEventListener('resize', function(){measureLayout();buildStars();positionHitbox();onScroll();});
window.addEventListener('load', init);
</script>
