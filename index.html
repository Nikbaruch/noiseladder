<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOISE LADDER</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
<style>

/* ═══════════════════════════════════════════════════════════
   VARIABLES GLOBALES
   Ces variables CSS centralisent tous les réglages du site.
   Modifie ici pour ajuster desktop, puis surcharge dans
   @media(max-width:768px) pour le mobile.
   ═══════════════════════════════════════════════════════════ */
:root {
  /* ── Lettres NOISE LADDER ── */
  --nl-x:       center;  /* position horizontale (center / px / %)   */
  --nl-y:       170px;   /* position verticale depuis le bas du sol   */

  /* ── Sol ── */
  --ground-h:   519px;   /* hauteur totale du sol                     */
  --ground-mid: 260px;   /* moitié du sol (utilisé pour le hint)      */

  /* ── Échelle ── */
  --ladder-w:   100px;   /* largeur de l'échelle                      */

  /* ── Personnage ── */
  --char-w:     290px;   /* largeur du personnage                     */
  --char-h:     370px;   /* hauteur du personnage                     */
  --char-hoff:  0px;     /* décalage horizontal depuis le centre      */
  --char-voff:  0px;     /* décalage vertical (non utilisé en direct) */

  /* ── Bulle BD ── */
  --bubble-w:   150px;   /* largeur de la bulle                       */
  --bubble-top: 40vh;    /* non utilisé directement, conservé         */

  /* ── Couleurs ── */
  --red:        #ff1a1a;
  --orange:     #ff6600;
  --fg:         #ede9e0; /* couleur texte principal                   */

  /* ── Satellite desktop ──
     Ajuste ces valeurs pour aligner les panels sur ton PNG
     satellite-body.png                                               */
  --sat-w:        1200px;  /* largeur du PNG satellite                */
  --sat-h:         600px;  /* hauteur du PNG satellite                */
  --sat-left-x:     40px;  /* panel vidéo : depuis bord gauche PNG    */
  --sat-left-y:    190px;  /* panel vidéo : depuis bord haut PNG      */
  --sat-left-w:    310px;  /* panel vidéo : largeur                   */
  --sat-left-h:    220px;  /* panel vidéo : hauteur                   */
  --sat-right-x:   850px;  /* panel playlist : depuis bord gauche PNG */
  --sat-right-y:   190px;  /* panel playlist : depuis bord haut PNG   */
  --sat-right-w:   310px;  /* panel playlist : largeur                */
  --sat-right-h:   220px;  /* panel playlist : hauteur                */

  /* ── UFO ── */
  --ufo-w:      1000px;  /* largeur du PNG ufo.png                    */
  --ufo-h:       800px;  /* hauteur du PNG ufo.png                    */
  --ufo-top:      20px;  /* distance depuis le haut de l'écran        */

  /* ── Bio ── */
  --bio-col-gap:  80px;  /* écart depuis le centre pour chaque colonne */
  --bio-col-w:   400px;  /* largeur d'une colonne de texte             */
  --bio-col-top:  35vh;  /* position verticale des colonnes            */

  /* ── Étoiles contact ── */
  --star-size:        80px;  /* taille de base des étoiles             */
  --bubble-contact-w: 180px; /* largeur des bulles de description      */
}


/* ═══════════════════════════════════════════════════════════
   RESET & BASE
   ═══════════════════════════════════════════════════════════ */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  overflow-x: hidden;
  background: #060606;
  color: var(--fg);
  font-family: "Share Tech Mono", monospace;
}


/* ═══════════════════════════════════════════════════════════
   STRUCTURE PRINCIPALE
   #progress  → barre rouge en haut (progression scroll)
   #scroller  → élément invisible qui crée la hauteur de scroll
   #scene     → conteneur fixe plein écran (tout le visuel)
   ═══════════════════════════════════════════════════════════ */
#progress {
  position: fixed;
  top: 0; left: 0;
  height: 2px;
  width: 0%;
  background: var(--red);
  z-index: 1000;
  box-shadow: 0 0 6px var(--red);
  transition: width .06s linear;
}

#scroller {
  height: 800vh;       /* ← longueur totale du scroll. 800vh = 8 écrans */
  position: relative;
  z-index: 0;
}

#scene {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  z-index: 1;
  pointer-events: none; /* la scène ne capte pas les clics par défaut */
}

/* Les éléments interactifs dans #scene réactivent les clics */
#scene .block,
#scene #hint,
#scene #character,
#scene .ext-link,
#scene .music-cloud,
#scene #satellite-wrap,
#scene .sat-interactive {
  pointer-events: auto;
}


/* ═══════════════════════════════════════════════════════════
   CIEL & ÉTOILES
   Deux canvas superposés :
   #sky-canvas   → dégradé animé (bleu jour → espace noir)
   #stars-canvas → points blancs (apparaissent en altitude)
   ═══════════════════════════════════════════════════════════ */
#sky-canvas {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  z-index: 0;
}

#stars-canvas {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  z-index: 1;
  opacity: 0; /* invisible au départ, géré par JS */
  transition: opacity 0.8s ease;
}


/* ═══════════════════════════════════════════════════════════
   ÉCHELLE
   Élément vertical centré, s'étend de haut en bas.
   L'image se répète verticalement (repeat-y).
   ▼ ZONE D'AJUSTEMENT : --ladder-w dans :root
   ═══════════════════════════════════════════════════════════ */
#ladder {
  position: absolute;
  top: 0; bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: var(--ladder-w);
  z-index: 24;
  background: url("assets/ladder-tile.png") repeat-y top center / 100% auto;
}


/* ═══════════════════════════════════════════════════════════
   SOL
   #ground    → arrière-plan du sol (derrière l'échelle)
   #ground-fg → avant-plan du sol (devant le personnage)
   Les deux slides vers le bas quand on monte (via JS).
   ▼ ZONE D'AJUSTEMENT : --ground-h dans :root
   ═══════════════════════════════════════════════════════════ */
#ground,
#ground-fg {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: var(--ground-h);
  background-repeat: no-repeat;
  background-position: bottom center;
  background-size: cover;
  pointer-events: none;
}
#ground    { z-index: 12; background-image: url("assets/ground-bg.png"); }
#ground-fg { z-index: 27; background-image: url("assets/ground-fg.png"); }


/* ═══════════════════════════════════════════════════════════
   LETTRES NOISE LADDER
   PNG positionné sur le sol.
   L'animation noise-flicker s'active au survol (via JS).
   ▼ ZONE D'AJUSTEMENT : --nl-x et --nl-y dans :root
   ═══════════════════════════════════════════════════════════ */
#noise-letters {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: var(--ground-h);
  z-index: 26;
  pointer-events: none;
  background-image: url("assets/noise-letters.png");
  background-size: 1073px 151px;
  background-repeat: no-repeat;
  background-position: var(--nl-x) var(--nl-y);
}

@keyframes noise-flicker {
  0%   { background-image: url("assets/letters-noise1.png"); }
  25%  { background-image: url("assets/letters-noise2.png"); }
  50%  { background-image: url("assets/letters-noise3.png"); }
  75%  { background-image: url("assets/letters-noise4.png"); }
  100% { background-image: url("assets/letters-noise1.png"); }
}
#noise-letters.noise-active {
  animation: noise-flicker 0.5s steps(1) infinite;
}

/* Zone invisible cliquable au-dessus des lettres (desktop uniquement) */
#letters-hitbox {
  position: fixed;
  z-index: 200;
  pointer-events: auto;
  display: block;
  background: transparent;
}


/* ═══════════════════════════════════════════════════════════
   NUAGES MUSICAUX
   Structure :
     .music-cloud          → conteneur positionné par JS
       .cloud-inner        → reçoit le scale hover
         img.cloud-bg      → PNG nuage de base
         img.cloud-fill    → même PNG teinté, masqué par clip-path
       img.play-btn-img    → bouton play/pause flottant
   ▼ ZONE D'AJUSTEMENT : CLOUD_CONFIG dans le JS
   ═══════════════════════════════════════════════════════════ */
.music-cloud {
  position: absolute;
  z-index: 18;
  will-change: transform, opacity;
}

/* Scale au survol isolé du transform JS */
.cloud-inner {
  position: absolute;
  inset: 0;
  transition: transform 0.22s ease;
  transform-origin: center center;
}
.music-cloud:hover .cloud-inner {
  transform: scale(1.09); /* ← grossissement au survol */
}

/* PNG de base du nuage */
.cloud-bg {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: fill;
  pointer-events: none;
  user-select: none;
  -webkit-user-drag: none;
}

/* PNG teinté révélé de gauche à droite selon la progression audio
   ▼ ZONE D'AJUSTEMENT : hue-rotate pour changer la couleur
      160deg = bleu / 0deg = rouge / 280deg = violet              */
.cloud-fill {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: fill;
  pointer-events: none;
  user-select: none;
  -webkit-user-drag: none;
  filter: sepia(1) saturate(3) hue-rotate(160deg) brightness(0.7);
  mix-blend-mode: multiply;
  clip-path: inset(0 100% 0 0); /* départ : entièrement masqué */
  transition: clip-path 0.1s linear;
}

/* Bouton play/pause flottant au centre du nuage
   ▼ ZONE D'AJUSTEMENT : width/height pour la taille du bouton */
.play-btn-img {
  position: absolute;
  z-index: 10;
  pointer-events: auto;
  user-select: none;
  -webkit-user-drag: none;
  width: 100px;   /* ← taille du bouton */
  height: 100px;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%) scale(1);
  transform-origin: center center;
  transition: transform 0.18s ease, filter 0.15s ease;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,0.35));
}
.play-btn-img:hover  { transform: translate(-50%,-50%) scale(1.18); filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5)); }
.play-btn-img:active { transform: translate(-50%,-50%) scale(0.90); filter: drop-shadow(0 1px 3px rgba(0,0,0,0.3)); }


/* ═══════════════════════════════════════════════════════════
   BULLE BD — AU-DESSUS DU PERSONNAGE
   Apparaît quand le scroll s'arrête.
   Position calculée depuis le bas : sol + perso + offset.
   ▼ ZONE D'AJUSTEMENT DESKTOP :
      --bubble-w   : largeur de la bulle
      bottom       : ground-h + char-h + offset (-450px ici)
                     augmente -450px pour monter, diminue pour descendre
   ═══════════════════════════════════════════════════════════ */
#speech-bubble {
  position: fixed;
  left: calc(50% + var(--char-hoff));
  transform: translateX(-50%);
  bottom: calc(var(--ground-h) + var(--char-h) + -450px); /* ← ajuste -450px */
  width: var(--bubble-w);
  z-index: 36;
  pointer-events: none;
  opacity: 0;
  will-change: transform, opacity;
}
#speech-bubble img {
  width: 100%;
  height: auto;
  display: block;
}

/* Animation d'entrée de la bulle */
@keyframes bubble-bounce-in {
  0%   { transform: translateX(-50%) translateY(-30px) scale(0.6); opacity: 0; }
  60%  { transform: translateX(-50%) translateY(6px)   scale(1.05); opacity: 1; }
  80%  { transform: translateX(-50%) translateY(-4px)  scale(0.97); }
  100% { transform: translateX(-50%) translateY(0)     scale(1);    opacity: 1; }
}
#speech-bubble.bubble-visible { animation: bubble-bounce-in 0.45s cubic-bezier(.22,.68,0,1.3) forwards; }
#speech-bubble.bubble-hidden  { opacity: 0; transition: opacity 0.15s ease; }


/* ═══════════════════════════════════════════════════════════
   PERSONNAGE
   Position : centré sur l'échelle, posé sur le sol.
   bottom calculé par JS (measureLayout) selon la taille d'écran.
   ▼ ZONE D'AJUSTEMENT :
      --char-w / --char-h : taille du personnage
      CHAR_BOTTOM_OFFSET_DESKTOP dans le JS pour la hauteur
      --char-hoff : décalage horizontal depuis le centre
   ═══════════════════════════════════════════════════════════ */
#character {
  position: fixed;
  left: calc(50% + var(--char-hoff));
  bottom: var(--ground-h); /* valeur initiale, remplacée par JS */
  transform: translate(-50%, 0);
  width: var(--char-w);
  height: var(--char-h);
  z-index: 30;
  pointer-events: none;
}

/* Frames du personnage — une seule visible à la fois via .active */
.char-frame          { position: absolute; inset: 0; width: 100%; height: 100%; display: none; }
.char-frame.active   { display: block; }
.char-frame img      { width: 100%; height: 100%; object-fit: contain; object-position: center; }
.char-placeholder    { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 3rem; }

/* Animations de lévitation (section bio) */
@keyframes char-bob {
  0%, 100% { transform: translate(-50%, 0) translateY(0);     }
  50%       { transform: translate(-50%, 0) translateY(-12px); }
}
@keyframes char-bob-mobile {
  0%, 100% { transform: translate(0, 0) translateY(0);     }
  50%       { transform: translate(0, 0) translateY(-12px); }
}
#character.char-frozen { animation: char-bob 1.8s ease-in-out infinite; }


/* ═══════════════════════════════════════════════════════════
   HINT "CLIMB TO EXPLORE"
   ▼ ZONE D'AJUSTEMENT DESKTOP :
      calc(--ground-mid - 200px) = position verticale
      change --ground-mid dans :root pour ajuster
   ═══════════════════════════════════════════════════════════ */
#hint {
  position: absolute;
  bottom: calc(var(--ground-mid) - 200px); /* ← ajuste via --ground-mid */
  left: 50%;
  transform: translateX(-50%);
  z-index: 60;
  display: flex;
  align-items: center;
  gap: 16px;
  pointer-events: none;
  transition: opacity 0.4s ease;
  animation: hint-bounce 1.2s ease-in-out infinite;
}
#hint-label {
  font-family: "Luckiest Guy", monospace;
  font-size: 2rem;            /* ← taille du texte desktop */
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(236,194,67,0.75);
  white-space: nowrap;
}

@keyframes hint-bounce {
  0%, 100% { transform: translateX(-20%) translateY(0);     }
  50%       { transform: translateX(-20%) translateY(-10px); }
}


/* ═══════════════════════════════════════════════════════════
   LABEL ALTITUDE
   Affiché en haut au centre (ex: "Ground level", "Clouds"...)
   ═══════════════════════════════════════════════════════════ */
#altitude {
  position: absolute;
  top: 2.5vh;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.56rem;
  letter-spacing: 0.3em;
  color: rgba(237,233,224,0.2);
  text-transform: uppercase;
  z-index: 70;
  pointer-events: none;
  transition: opacity 0.5s;
  white-space: nowrap;
}


/* ═══════════════════════════════════════════════════════════
   BOUTON MUTE
   ▼ ZONE D'AJUSTEMENT : top / left pour repositionner
   ═══════════════════════════════════════════════════════════ */
#mute-btn {
  position: fixed;
  top: 50px;
  left: 100px;
  z-index: 500;
  width: 80px; height: 80px;
  border-radius: 50%;
  background: rgba(124,121,121,0.3);
  backdrop-filter: blur(8px);
  color: var(--fg);
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .2s;
}
#mute-btn:hover { background: rgba(129,135,193,0.418); }
#mute-btn svg   { width: 50px; height: 50px; fill: none; stroke: currentColor; stroke-width: 1; stroke-linecap: round; stroke-linejoin: round; overflow: visible; }

/* Flèche "PUMP UP THE VOLUME" à côté du bouton mute */
#volume-hint {
  position: fixed;
  top: 90px;
  left: calc(100px + 80px + 18px); /* aligne avec le bord droit du bouton */
  transform: translateY(-50%);
  z-index: 500;
  display: flex;
  align-items: center;
  gap: 12px;
  pointer-events: none;
  animation: hint-bounce-h 1.2s ease-in-out infinite;
  transition: opacity 0.4s ease;
}
#volume-hint-label {
  font-family: "Luckiest Guy", monospace;
  font-size: 1.5rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(236,194,67,0.75);
  white-space: nowrap;
}
#volume-hint.sound-on { display: none; } /* caché une fois le son activé */

@keyframes hint-bounce-h {
  0%, 100% { transform: translateY(-50%) translateX(0);    }
  50%       { transform: translateY(-50%) translateX(8px); }
}


/* ═══════════════════════════════════════════════════════════
   SATELLITE VIDEO (desktop)
   Un seul PNG avec deux panels superposés :
   #sat-panel-left  → lecteur YouTube
   #sat-panel-right → playlist
   Les satellites mobiles (#sat-wrap-mob-a/b) sont cachés ici
   et affichés via @media mobile.
   ▼ ZONE D'AJUSTEMENT : variables --sat-* dans :root
   ═══════════════════════════════════════════════════════════ */
#sat-wrap-mob-a,
#sat-wrap-mob-b { display: none; } /* cachés sur desktop */

#satellite-wrap {
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%) scale(0.01);
  transform-origin: center center;
  z-index: 15;
  width: var(--sat-w);
  height: var(--sat-h);
  pointer-events: none;
  will-change: transform, opacity;
  opacity: 0;
}

#sat-body {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: contain;
  pointer-events: none;
  user-select: none;
}

.sat-panel {
  position: absolute;
  overflow: hidden;
  background: rgba(8,16,32,0.88);
  border: 1px solid rgba(100,160,255,0.2);
  display: flex;
  flex-direction: column;
  opacity: 0;
  transition: opacity 0.4s ease;
  pointer-events: none;
}
.sat-panel.panel-ready { opacity: 1; pointer-events: auto; }

#sat-panel-left  { left: var(--sat-left-x);  top: var(--sat-left-y);  width: var(--sat-left-w);  height: var(--sat-left-h);  }
#sat-panel-right { left: var(--sat-right-x); top: var(--sat-right-y); width: var(--sat-right-w); height: var(--sat-right-h); }

.sat-panel-header {
  padding: 6px 10px 5px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 0.75rem;
  letter-spacing: 0.12em;
  color: rgba(100,180,255,0.65);
  border-bottom: 1px solid rgba(100,160,255,0.12);
  flex-shrink: 0;
}

#sat-player-wrap {
  flex: 1;
  position: relative;
  background: #000;
}
#sat-player-wrap iframe {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  border: none;
}

/* Playlist dans le panel droit */
#sat-playlist {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: rgba(100,160,255,0.25) transparent;
}
.sat-playlist-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  transition: background 0.15s;
}
.sat-playlist-item:hover  { background: rgba(100,160,255,0.08); }
.sat-playlist-item.active { background: rgba(100,160,255,0.14); }
.sat-playlist-thumb {
  width: 56px; height: 32px;
  object-fit: cover;
  flex-shrink: 0;
  border: 1px solid rgba(100,160,255,0.15);
}
.sat-playlist-title {
  font-size: 0.55rem;
  letter-spacing: 0.05em;
  color: rgba(237,233,224,0.55);
  line-height: 1.3;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
.sat-playlist-item.active .sat-playlist-title { color: rgba(100,180,255,0.85); }


/* ═══════════════════════════════════════════════════════════
   UFO — SECTION BIO
   Descend depuis le haut de l'écran.
   La lévitation CSS est isolée dans #ufo-inner pour
   ne pas interférer avec le translateY JS du parent.
   ▼ ZONE D'AJUSTEMENT : --ufo-w / --ufo-h / --ufo-top dans :root
   ═══════════════════════════════════════════════════════════ */
#ufo-wrap {
  position: absolute;
  left: 50%;
  top: var(--ufo-top);
  transform: translateX(-50%); /* JS surcharge ce transform pendant l'animation */
  width: var(--ufo-w);
  height: var(--ufo-h);
  z-index: 28;
  pointer-events: none;
  will-change: transform, opacity;
  opacity: 0;
}

#ufo-inner {
  width: 100%; height: 100%;
  transition: transform 0.3s ease;
}

#ufo-img {
  width: 100%; height: 100%;
  object-fit: contain;
  display: block;
}

/* ▼ ZONE D'AJUSTEMENT : amplitude (-18px) et durée (2.4s) */
@keyframes ufo-levitate {
  0%, 100% { transform: translateY(0);     }
  50%       { transform: translateY(-18px); }
}
#ufo-wrap.ufo-active #ufo-inner {
  animation: ufo-levitate 2.4s ease-in-out infinite;
}


/* ═══════════════════════════════════════════════════════════
   BIO — TEXTE TYPEWRITER (deux colonnes)
   Desktop : colonne gauche (align right) + colonne droite (align left)
   Mobile  : deux blocs empilés (overridés dans @media)
   ▼ ZONE D'AJUSTEMENT : --bio-col-* dans :root
   ═══════════════════════════════════════════════════════════ */
#bio-text-wrap {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  z-index: 29;
  opacity: 0;
  transition: opacity 0.4s ease;
}
#bio-text-wrap.bio-visible { opacity: 1; }

#bio-col-left {
  position: absolute;
  top: var(--bio-col-top);
  right: calc(50% + var(--bio-col-gap)); /* à gauche du centre */
  width: var(--bio-col-w);
  text-align: right;
}
#bio-col-right {
  position: absolute;
  top: var(--bio-col-top);
  left: calc(50% + var(--bio-col-gap));  /* à droite du centre */
  width: var(--bio-col-w);
  text-align: left;
}

/* ▼ ZONE D'AJUSTEMENT : taille du texte bio (clamp = dynamique) */
.bio-col-text {
  font-family: 'Courier New', 'Courier', monospace;
  font-size: clamp(0.55rem, 1.4vw, 1rem); /* min / fluide / max */
  line-height: 1.8;
  color: rgba(237,233,224,0.85);
  white-space: pre-wrap;
}


/* ═══════════════════════════════════════════════════════════
   SECTION CONTACT — ÉTOILES RÉSEAUX SOCIAUX
   Les étoiles sont positionnées en % de l'écran via JS (CONTACT_STARS).
   Sur mobile elles sont repositionnées par buildContactStarsMobile().
   ▼ ZONE D'AJUSTEMENT :
      --star-size        : taille de base des étoiles
      --bubble-contact-w : largeur des bulles de description
      CONTACT_STARS dans le JS pour les positions
   ═══════════════════════════════════════════════════════════ */
#contact-stars {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 32;
  opacity: 0;
}
#contact-stars.contact-visible { opacity: 1; }

.contact-star {
  position: absolute;
  width: var(--star-size);
  height: var(--star-size);
  pointer-events: inherit;
  cursor: pointer;
  transform-origin: center center;
  animation: star-pulse var(--star-dur, 3s) ease-in-out infinite;
  animation-delay: var(--star-delay, 0s);
  transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
}
.contact-star img.star-img {
  width: 100%; height: 100%;
  object-fit: contain;
  display: block;
  pointer-events: none;
}

/* ▼ ZONE D'AJUSTEMENT : keyframes du pulse
   0%/100% → petite (scale 0.75)
   60%     → grande (scale 1.15, grossit lentement)
   80%     → petite (scale 0.80, rétrécit vite)         */
@keyframes star-pulse {
  0%   { transform: scale(0.75); }
  60%  { transform: scale(1.15); }
  80%  { transform: scale(0.80); }
  100% { transform: scale(0.75); }
}

/* Hover : animation stoppée, étoile grosse et fixe */
.contact-star:hover {
  animation: none;
  transform: scale(1.6);
  z-index: 10;
}

/* Bulle de description au-dessus de l'étoile */
.contact-star .star-bubble {
  position: absolute;
  bottom: calc(100% + 10px);
  left: 50%;
  transform: translateX(-50%) scale(0.7);
  width: var(--bubble-contact-w);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s ease, transform 0.18s cubic-bezier(.34,1.56,.64,1);
  transform-origin: bottom center;
}
.contact-star .star-bubble img { width: 100%; height: auto; display: block; }
.contact-star:hover .star-bubble {
  opacity: 1;
  transform: translateX(-50%) scale(1);
}


/* ═══════════════════════════════════════════════════════════
   DIVERS
   ═══════════════════════════════════════════════════════════ */
.block.active { pointer-events: auto; }

@keyframes freq-anim { from { height: 10%; } to { height: 100%; } }


/* ═══════════════════════════════════════════════════════════
   MOBILE — max-width: 768px
   Toutes les règles ci-dessous ne s'appliquent qu'au mobile.
   Le desktop reste strictement inchangé.
   ═══════════════════════════════════════════════════════════ */
@media(max-width:768px){

  /* ── Bouton play/pause mobile ──
     ▼ ZONE D'AJUSTEMENT : taille proportionnelle aux nuages
     Règle : MOB_CLOUD_W * 0.3 ≈ bonne taille
     Si MOB_CLOUD_W = 42, alors ~13vw est bien proportionné    */
  .play-btn-img {
    width:  13vw;   /* ← ajuste selon la taille de tes nuages  */
    height: 13vw;
  }


  /* ── Variables mobiles ──
     Toutes en vw/vh pour s'adapter à n'importe quelle taille d'écran.
     ▼ ZONE D'AJUSTEMENT MOBILE                                       */
  :root {
    --ground-h:         50vw;   /* hauteur du sol                    */
    --ground-mid:       14vw;
    --ladder-w:         15vw;   /* largeur échelle                   */
    --char-w:           40vw;   /* largeur personnage                 */
    --char-h:           50vw;   /* hauteur personnage                 */
    --char-hoff:        0px;
    --char-voff:        0px;
    --ufo-w:            90vw;   /* largeur UFO                        */
    --ufo-h:            67vw;
    --ufo-top:          5vw;
    --star-size:        12vw;   /* taille étoiles contact             */
    --bubble-w:         20vw;   /* largeur bulle BD                   */
    --bubble-top:       75vh;
    --bubble-contact-w: 35vw;   /* largeur bulles description étoiles */
    --sat-w:            90vw;   /* largeur satellites                 */
    --sat-h:            50vw;
    --nl-y:             4vw;    /* position verticale lettres         */
    --char-mob-nudge:   0vw;    /* affinage horizontal personnage     */
  }


  /* ── Lettres NOISE LADDER mobile ──
     ▼ ZONE D'AJUSTEMENT :
        background-size  → largeur du PNG affiché (vw)
        background-position → X Y (X=gauche/droite, Y=haut/bas) */
  #noise-letters {
    background-image:    url('assets/mobile-noise-letters.png') !important;
    background-size:     70vw auto !important;
    background-repeat:   no-repeat !important;
    background-position: 4vw -1vw !important; /* ← ajuste X et Y ici */
  }
  #noise-letters.noise-active { animation: none !important; }


  /* ── Échelle : à droite ──
     ▼ ZONE D'AJUSTEMENT : right = distance depuis le bord droit */
  #ladder {
    left: auto;
    right: 1vw;          /* ← ajuste ici */
    transform: none;
  }


  /* ── Personnage : centré sur l'échelle ──
     Formule : right_echelle + ladder-w/2 - char-w/2
     ▼ ZONE D'AJUSTEMENT :
        --char-mob-nudge dans :root (+ = droite, - = gauche)
        CHAR_BOTTOM_OFFSET_MOBILE dans le JS pour la hauteur  */
  #character {
    left: auto;
    right: calc(1vw + var(--ladder-w) / 2 - var(--char-w) / 2 - var(--char-mob-nudge, 0vw));
    transform: translate(0, 0);
    /* bottom calculé par JS measureLayout */
  }


  /* ── Bulle BD mobile ──
     ▼ ZONE D'AJUSTEMENT :
        -50vw = offset vertical (augmente pour monter, diminue pour descendre)
        right  = distance depuis le bord droit
        --bubble-w = largeur (défini dans :root mobile)              */
  #speech-bubble {
    left:      auto;
    right:     0vw;
    transform: none;
    bottom:    calc(var(--ground-h) + var(--char-h) + -50vw); /* ← ajuste -50vw */
    width:     var(--bubble-w);
  }


  /* ── Hint "CLIMB TO EXPLORE" mobile ──
     ▼ ZONE D'AJUSTEMENT :
        bottom    → hauteur au-dessus du sol (augmente pour monter)
        translateX dans @keyframes hint-bounce-mobile → décalage horizontal
          0%   = aligné sur le bord droit du point `right`
          50%  = centré sur l'échelle
          100% = décalé à gauche
        font-size → taille du texte                                  */
  @keyframes hint-bounce-mobile {
    0%, 100% { transform: translateX(0%) translateY(0);     }
    50%       { transform: translateX(0%) translateY(-10px); }
    /* ← change 50% pour ajuster le centrage horizontal */
  }
  #hint {
    left:      auto;
    right:     calc(2vw + var(--ladder-w) / 2);
    bottom:    calc(var(--ground-h) + 4vw);
    animation: hint-bounce-mobile 1.2s ease-in-out infinite;
    transform: none;
  }
  #hint-label { font-size: 3vw; }





  /* ── Satellite desktop caché — mobiles affichés ── */
  #satellite-wrap          { display: none !important; }
  #sat-wrap-mob-a,
  #sat-wrap-mob-b          { display: block; }

  /* ── Panels des satellites mobiles ──
     ▼ ZONE D'AJUSTEMENT : left/top/width/height = position sur le PNG */
  .sat-mob-panel {
    position: absolute;
    overflow: hidden;
    background: rgba(8,16,32,0.88);
    border: 1px solid rgba(100,160,255,0.2);
    display: flex;
    flex-direction: column;
    opacity: 0;
    transition: opacity 0.4s ease;

    left: 2%; top: 15%; width: 46%; height: 70%; /* ← ajuste selon ton PNG */
  }
  .sat-mob-panel.panel-ready { opacity: 1; pointer-events: auto; }
  .sat-mob-player-wrap { flex: 1; position: relative; background: #000; }
  .sat-mob-player-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
  #sat-mob-playlist   { flex: 1; overflow-y: auto; scrollbar-width: thin; }
  .sat-playlist-item  { padding: 3px 5px; }
  .sat-playlist-thumb { width: 36px; height: 20px; }
  .sat-playlist-title { font-size: 0.42rem; }


  /* ── Bio : colonnes empilées ──
     ▼ ZONE D'AJUSTEMENT :
        top   → position verticale (vh)
        width → largeur (ne doit pas dépasser l'échelle)
        font-size via clamp : ajuste les 3 valeurs min/fluide/max   */
  #bio-col-left {
    right:      auto !important;
    left:       5vw  !important;
    top:        20vh;
    width:      55vw;
    text-align: right;
    font-size:  clamp(0.5rem, 2.6vw, 0.85rem);
    line-height: 1.6;
  }
  #bio-col-right {
    left:       5vw  !important;
    right:      auto !important;
    top:        60vh; /* ← en dessous de bio-col-left */
    width:      55vw;
    text-align: left;
    font-size:  clamp(0.5rem, 2.6vw, 0.85rem);
    line-height: 1.6;
  }


  /* ── UFO centré ── */
  #ufo-wrap {
    left: 50%;
    transform: translateX(-50%);
  }


  /* ── Personnage figé section bio : animation sans translate(-50%) ── */
  #character.char-frozen {
    animation: char-bob-mobile 1.8s ease-in-out infinite;
  }


  /* ── Bouton mute ──
     ▼ ZONE D'AJUSTEMENT : top/left/width/height */
  #mute-btn            { top: 10vw;  left: 4vw;  width: 14vw; height: 14vw; }
  #mute-btn svg        { width: 8vw; height: 8vw; }
  #volume-hint         { top: 17vw; left: 20vw; }
  #volume-hint-label   { font-size: 6vw; }

}
</style>

<body>

</div>

<script>
'use strict';

var CLOUD_CONFIG = [
  { png:'assets/cloud-1.png', mp3:'assets/track-01.mp3', name:'MACHINE HATRED',     w:450, h:250, side:'left',  vPos:80, hOff:100, pIn:0.05, pFull:0.11, pFadeOut:0.32, pOut:0.40, z:25  },
  { png:'assets/cloud-2.png', mp3:'assets/track-02.mp3', name:'WHITE NOISE RITUAL', w:400, h:250, side:'right', vPos:80, hOff:100, pIn:0.06, pFull:0.12, pFadeOut:0.32, pOut:0.40, z:200 },
  { png:'assets/cloud-3.png', mp3:'assets/track-03.mp3', name:'FEEDBVCK',           w:400, h:200, side:'left',  vPos:60, hOff:5,   pIn:0.08, pFull:0.14, pFadeOut:0.34, pOut:0.42, z:15  },
  { png:'assets/cloud-5.png', mp3:'assets/track-05.mp3', name:'SYSTEM COLLAPSE',    w:400, h:230, side:'right', vPos:60, hOff:1,   pIn:0.09, pFull:0.15, pFadeOut:0.34, pOut:0.42, z:10  },
  { png:'assets/cloud-4.png', mp3:'assets/track-04.mp3', name:'SYSTEM COLLAPSE',    w:300, h:170, side:'right', vPos:20, hOff:1,   pIn:0.09, pFull:0.15, pFadeOut:0.34, pOut:0.42, z:10  },
  { png:'assets/cloud-6.png', mp3:'assets/track-06.mp3', name:'DRILL & KILL',       w:370, h:200, side:'right', vPos:35, hOff:200, pIn:0.12, pFull:0.18, pFadeOut:0.36, pOut:0.44, z:5   },
  { png:'assets/cloud-7.png', mp3:'assets/track-07.mp3', name:'STATIC DEATH',       w:310, h:180, side:'left',  vPos:38, hOff:5,   pIn:0.14, pFull:0.20, pFadeOut:0.38, pOut:0.46, z:14  },
  { png:'assets/cloud-9.png', mp3:'assets/track-09.mp3', name:'ZERO SIGNAL',        w:295, h:168, side:'left',  vPos:25, hOff:200, pIn:0.17, pFull:0.23, pFadeOut:0.40, pOut:0.48, z:21  },
];
var CLOUD_EASE_IN=3, CLOUD_EASE_OUT=2;

var skyCanvas=document.getElementById('sky-canvas'), skyCtx=skyCanvas.getContext('2d');
var SKY_ZONES=[[0.00,'#1a4a8e','#5ba3d9','#c8a97a'],[0.30,'#1a4a8e','#4a90c4','#b8955a'],[0.35,'#1a3a7e','#4080b4','#a07840'],[0.40,'#0d2050','#1a3a6e','#d4835a'],[0.55,'#060d28','#0d1e44','#3a1a0a'],[0.80,'#020810','#060d20','#0f0808'],[1.00,'#000000','#010308','#020205']];
function lerpColor(a,b,t){var ai=parseInt(a.slice(1),16),bi=parseInt(b.slice(1),16),ar=(ai>>16)&255,ag=(ai>>8)&255,ab=ai&255,br=(bi>>16)&255,bg=(bi>>8)&255,bb=bi&255;return 'rgb('+Math.round(ar+(br-ar)*t)+','+Math.round(ag+(bg-ag)*t)+','+Math.round(ab+(bb-ab)*t)+')';}
function getSkyColors(p){var z0=SKY_ZONES[0],z1=SKY_ZONES[1];for(var i=0;i<SKY_ZONES.length-1;i++){if(p>=SKY_ZONES[i][0]&&p<=SKY_ZONES[i+1][0]){z0=SKY_ZONES[i];z1=SKY_ZONES[i+1];break;}}var t=(p-z0[0])/(z1[0]-z0[0]||1);return{top:lerpColor(z0[1],z1[1],t),mid:lerpColor(z0[2],z1[2],t),bottom:lerpColor(z0[3],z1[3],t)};}
function drawSky(p){var W=skyCanvas.width=window.innerWidth,H=skyCanvas.height=window.innerHeight,c=getSkyColors(p),g=skyCtx.createLinearGradient(0,0,0,H);g.addColorStop(0,c.top);g.addColorStop(0.5,c.mid);g.addColorStop(1,c.bottom);skyCtx.fillStyle=g;skyCtx.fillRect(0,0,W,H);if(p<0.5){var so=Math.max(0,(0.5-p)/0.5)*0.6,gh=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--ground-h'))||519,sy=H-gh-20,sg=skyCtx.createRadialGradient(W/2,sy,0,W/2,sy,W*0.3);sg.addColorStop(0,'rgba(255,210,80,'+(so*0.5)+')');sg.addColorStop(0.4,'rgba(255,150,30,'+(so*0.3)+')');sg.addColorStop(1,'transparent');skyCtx.fillStyle=sg;skyCtx.fillRect(0,0,W,H);}}

var starsCanvas=document.getElementById('stars-canvas'),starsCtx=starsCanvas.getContext('2d'),starsBuilt=false;
function buildStars(){var W=starsCanvas.width=window.innerWidth,H=starsCanvas.height=window.innerHeight;starsCtx.clearRect(0,0,W,H);var n=Math.floor(W*H/1200);for(var i=0;i<n;i++){var x=Math.random()*W,y=Math.random()*H*0.85,r=Math.random()*1.4+0.3,b=0.4+Math.random()*0.6;starsCtx.beginPath();starsCtx.arc(x,y,r,0,Math.PI*2);starsCtx.fillStyle='rgba(255,255,255,'+b+')';starsCtx.fill();}starsBuilt=true;}
function updateStars(p){starsCanvas.style.opacity=Math.max(0,Math.min(1,(p-0.45)/0.25));if(!starsBuilt&&p>0.3)buildStars();}

var ALT=[[0,'Ground level'],[0.12,'Low altitude'],[0.30,'Clouds'],[0.50,'High altitude'],[0.65,'Stratosphere'],[0.80,'Near space'],[0.92,'Deep space']];
function updateAltitude(p){var el=document.getElementById('altitude'),lbl=ALT[0][1];for(var i=0;i<ALT.length;i++)if(p>=ALT[i][0])lbl=ALT[i][1];el.textContent=lbl;el.style.opacity=(p<0.05||p>0.97)?0:1;}

var CLIMB_FRAMES=['char-climb-1','char-climb-2','char-climb-3','char-climb-4'];
var PIXELS_PER_FRAME=60, IDLE_DELAY_MS=250, SIT_THRESHOLD=0.02;
var charFrameIdx=0, charState='sit', idleTimer=null, scrollAccum=0, lastScrollY=window.scrollY;

function showFrame(id){['char-sit','char-idle'].concat(CLIMB_FRAMES).forEach(function(fid){var el=document.getElementById(fid);if(el)el.classList.toggle('active',fid===id);});}
function goIdle(){if(charState==='idle')return;charState='idle';scrollAccum=0;showFrame('char-idle');}
function goSit(){if(charState==='sit')return;charState='sit';clearTimeout(idleTimer);idleTimer=null;charFrameIdx=0;scrollAccum=0;showFrame('char-sit');}
function updateCharacter(p){
  if(bioActive)return;
  if(p<SIT_THRESHOLD){goSit();lastScrollY=window.scrollY;return;}
  var cy=window.scrollY,delta=Math.abs(cy-lastScrollY);lastScrollY=cy;scrollAccum+=delta;
  if(scrollAccum>=PIXELS_PER_FRAME){var steps=Math.floor(scrollAccum/PIXELS_PER_FRAME);scrollAccum=scrollAccum%PIXELS_PER_FRAME;charFrameIdx=(charFrameIdx+steps)%CLIMB_FRAMES.length;charState='climb';showFrame(CLIMB_FRAMES[charFrameIdx]);}
  else if(charState==='sit'){charState='climb';showFrame(CLIMB_FRAMES[charFrameIdx]);}
  clearTimeout(idleTimer);idleTimer=setTimeout(function(){if(charState==='climb')goIdle();},IDLE_DELAY_MS);
}

/* ▼ ZONE D'AJUSTEMENT position personnage
   positif = monte, negatif = descend */
var CHAR_BOTTOM_OFFSET_DESKTOP = -150;
var CHAR_BOTTOM_OFFSET_MOBILE  = 0;
/* ▲ FIN */

function measureLayout(){
  var charEl=document.getElementById('character');
  if(!charEl)return;
  var offset=IS_MOBILE?CHAR_BOTTOM_OFFSET_MOBILE:CHAR_BOTTOM_OFFSET_DESKTOP;
  var groundH=Math.min(parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--ground-h'))||519,window.innerHeight*0.35);
  charEl.style.bottom=(groundH+offset)+'px';
}

var BLOCKS=[];
function easeOut(t){return 1-Math.pow(1-t,3);}
function easeIn(t){return Math.pow(t,3);}
function updateBlocks(p){var vw=window.innerWidth;BLOCKS.forEach(function(b){var el=document.getElementById(b.id);if(!el)return;var off=vw*1.1,tx=0,op=0;if(p<b.pIn){tx=b.dirIn==='left'?-off:off;op=0;}else if(p<=b.pPeak){var t=easeOut((p-b.pIn)/(b.pPeak-b.pIn));tx=(b.dirIn==='left'?-off:off)*(1-t);op=t;}else if(p<b.pFade){tx=0;op=1;}else if(p<=b.pOut){var t2=easeIn((p-b.pFade)/(b.pOut-b.pFade));tx=(b.dirIn==='left'?off:-off)*t2;op=1-t2;}else{tx=b.dirIn==='left'?off:-off;op=0;}el.style.transform='translateX('+tx+'px)';el.style.opacity=op;el.classList.toggle('active',op>0.05);});}

var noiseAudio=document.getElementById('noise-audio');
var SND=(function(){
  var unlocked=false, muted=false, all=[];

  function register(el){if(all.indexOf(el)===-1)all.push(el);return el;}

  function unlock(){
    if(unlocked)return;
    unlocked=true;
    // iOS : on crée un AudioContext silencieux pour déverrouiller
    // sans lancer les pistes audio des nuages
    try {
      var ac = new (window.AudioContext||window.webkitAudioContext)();
      var buf = ac.createBuffer(1,1,22050);
      var src = ac.createBufferSource();
      src.buffer = buf;
      src.connect(ac.destination);
      src.start(0);
      src.onended = function(){ ac.close(); };

var MOB_STAR_RIGHT=20,MOB_STAR_Y_START=12,MOB_STAR_Y_GAP=14;
function buildContactStarsMobile(){var stars=contactWrap.querySelectorAll('.contact-star');stars.forEach(function(star,idx){var cfg=CONTACT_STARS[idx];if(!cfg)return;var sizePx='calc(var(--star-size) * '+cfg.size+')';star.style.cssText=['right:'+MOB_STAR_RIGHT+'vw;','left: auto;','top:'+(MOB_STAR_Y_START+idx*MOB_STAR_Y_GAP)+'vh;','width:'+sizePx+';','height:'+sizePx+';','--star-dur:'+cfg.dur+'s;','--star-delay:'+cfg.delay+'s;','margin-right: calc('+sizePx+' / -2);','margin-top:   calc('+sizePx+' / -2);','margin-left: 0;'].join('');});}

function updateClouds(p){var vw=window.innerWidth,vh=window.innerHeight;var ladderCx=vw/2;var ladderHW=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--ladder-w'))||240;ladderHW=ladderHW/2;cloudEls.forEach(function(item){var cfg=item.cfg,el=item.el;var finalY=vh*(cfg.vPos/100)-cfg.h/2;var finalX=cfg.side==='left'?ladderCx-ladderHW-cfg.hOff-cfg.w:ladderCx+ladderHW+cfg.hOff;var tx=0,op=0;if(p<cfg.pIn){tx=vw+cfg.w;op=0;}else if(p<=cfg.pFull){var t=1-Math.pow(1-(p-cfg.pIn)/(cfg.pFull-cfg.pIn),CLOUD_EASE_IN);tx=(vw+cfg.w)*(1-t);op=t;}else if(p<cfg.pFadeOut){tx=0;op=1;}else if(p<=cfg.pOut){var t2=Math.pow((p-cfg.pFadeOut)/(cfg.pOut-cfg.pFadeOut),CLOUD_EASE_OUT);tx=-t2*(vw+cfg.w);op=1-t2;}else{tx=-(vw+cfg.w);op=0;}el.style.left=finalX+'px';el.style.top=finalY+'px';el.style.transform='translate('+tx+'px,0)';el.style.opacity=op;el.style.pointerEvents=op>0.1?'auto':'none';});}

var NL_W=1073,NL_H=151,currentTY=0;
var hitbox=document.getElementById('letters-hitbox');
function positionHitbox(){var st=getComputedStyle(document.documentElement);var nlX=st.getPropertyValue('--nl-x').trim();var nlY=parseFloat(st.getPropertyValue('--nl-y'))||170;var gh=parseFloat(st.getPropertyValue('--ground-h'))||519;var vw=window.innerWidth,vh=window.innerHeight;var left=nlX==='center'?(vw-NL_W)/2:nlX.indexOf('%')>-1?parseFloat(nlX)/100*vw-NL_W/2:parseFloat(nlX);hitbox.style.left=Math.round(left)+'px';hitbox.style.top=Math.round((vh-gh)+nlY+currentTY)+'px';hitbox.style.width=NL_W+'px';hitbox.style.height=NL_H+'px';}
function initNoiseHover(){var noiseEl=document.getElementById('noise-letters');hitbox.addEventListener('mouseenter',function(){noiseEl.classList.add('noise-active');SND.play(noiseAudio);});hitbox.addEventListener('mouseleave',function(){noiseEl.classList.remove('noise-active');SND.stop(noiseAudio);});}

var TILE_H=200,SM=8;
var $ladder=document.getElementById('ladder');
function updateLadder(p){$ladder.style.backgroundPositionY=(p*TILE_H*SM)+'px';var prog=Math.min(1,p/0.25);currentTY=prog*(window.innerHeight*1.1);['ground','ground-fg','noise-letters'].forEach(function(id){var e=document.getElementById(id);if(e)e.style.transform='translateY('+currentTY+'px)';});positionHitbox();}

var $prog=document.getElementById('progress');
var $hint=document.getElementById('hint');
var oscScrollTimer=null,isScrolling=false;
function onScroll(){var maxSc=document.getElementById('scroller').offsetHeight-window.innerHeight;if(maxSc<=0)return;var p=Math.max(0,Math.min(1,1-window.scrollY/maxSc));$prog.style.width=(p*100)+'%';var scrollHintOpacity=Math.max(0,1-p/0.08);$hint.style.opacity=scrollHintOpacity;var vh=document.getElementById('volume-hint');if(vh)vh.style.opacity=scrollHintOpacity;isScrolling=true;clearTimeout(oscScrollTimer);oscScrollTimer=setTimeout(function(){isScrolling=false;OSC.update(p,false);updateBubble(p,false);},OSC_STOP_DELAY);OSC.update(p,true);updateBubble(p,true);drawSky(p);updateStars(p);updateAltitude(p);updateCharacter(p);updateLadder(p);updateBlocks(p);if(IS_MOBILE){updateCloudsMobile(p);updateSatelliteMobile(p);}else{updateClouds(p);updateSatellite(p);}updateBio(p);updateContact(p);}

function init(){measureLayout();buildClouds();buildSatellite();initBio();if(IS_MOBILE)buildMobileSatellite();initMuteBtn();initNoiseHover();positionHitbox();showFrame('char-sit');showBubble(0);drawSky(0);var maxSc=document.getElementById('scroller').offsetHeight-window.innerHeight;window.scrollTo({top:maxSc,behavior:'instant'});setTimeout(onScroll,60);}

window.addEventListener('scroll',onScroll,{passive:true});
window.addEventListener('resize',function(){measureLayout();buildStars();positionHitbox();onScroll();});
window.addEventListener('load',init);
</script>
</body>
</html>
